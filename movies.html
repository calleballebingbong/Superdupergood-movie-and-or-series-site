<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="site.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Rethink+Sans:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="Key.js"></script>
</head>
<body>
    <header class="header-main">
        <div class="header-main-logo">
            <img src="logo.svg" alt="logo" class="logo">
            <nav class="header-main-nav">
                <ul>
                    <li><a href="homepage.html">HOME</a></li>
                    <li><a href="movies.html">MOVIES</a></li>
                    <li><a href="#">ABOUT US</a></li>
                    <li><a href="#">CONTACT</a></li>
                </ul>
            </nav>
        </div>
        <input onblur="hidesearch()" onfocus="showsearch()" 
        id="menuSearch" 
        class="search-input" 
        type="text" 
        placeholder="Search for a movie..." 
        onkeyup="menuSearchbar()">

        <div class = "menu-search-results" id="menuSearchResults"></div>
        <div class="header-main-sm">
            <div class="header-main-sm-ig"></div>
            <div class="header-main-sm-yt"></div>
        </div>
    </header>

    <!-- Search -->
    <div class="search-container">   
        <h1>Search for a Movie</h1>

        <form>
            <input type="text" id="txtSearch" placeholder="Search for movies" />
        </form>
    </div>

    <div id="popularMovies"></div>

    <div id="nowShowing"></div>

    

    <script src="tmbdapi.js"></script>
    <script src="hideandshow.js"></script>
    <script src="loadMovies.js"></script>

</body>


</html>
